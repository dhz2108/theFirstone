name: Build Android APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # Aktualisiert von v3 auf v4

      - name: Build with Buildozer
        uses: ArtemShatalov/buildozer-action@v1
        with:
          buildozer_version: master
          python_version: 3.10

      - name: Upload APK
        uses: actions/upload-artifact@v4  # Das löst deinen Fehler!
        with:
          name: MeinAppPaket
          path: bin/*.apk
